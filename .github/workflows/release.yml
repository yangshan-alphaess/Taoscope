name: Release

# Push a tag like `v0.2.0` to fire this. The workflow builds Taoscope on all
# three desktop platforms, signs the bundles with the project ed25519 key,
# publishes them as a GitHub Release, and emits a `latest.json` manifest the
# in-app updater fetches from
# `https://github.com/<owner>/Taoscope/releases/latest/download/latest.json`.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — contents of the .key file generated
#                                          by `pnpm tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — the passphrase you set when generating
#                                          it (set to empty string if none)
#
# Optional (only when you start signing the binaries for the OS — Stage 2):
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID  — macOS code signing + notarize
#   WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD                  — Win

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple silicon
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          # Intel macs
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match the local toolchain exactly. `version: 11` would resolve
          # to "latest 11.x" — pnpm 11.3 silently raised its Node floor to
          # 22.13 (it imports the Node 22.5+ builtin `node:sqlite`), which
          # broke our Node 20 runners. Pin the patch to the version that
          # produced the on-disk lockfile.
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — current Active LTS, satisfies any future pnpm
          # minor bump that pulls in newer node: builtins.
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS matrix entries cross-compile via the --target flag above.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build + sign + upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Taoscope ${{ github.ref_name }}"
          releaseBody: "See the assets below to download for your platform."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Tauri 2 produces signed updater artifacts + a `latest.json` per
          # platform automatically when this is true. tauri-action wires them
          # to the release.
          includeUpdaterJson: true
